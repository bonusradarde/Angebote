    // ── Geo-Detection via IP ──────────────────────────────────────────────────

    async function detectLang() {
      try {
        const res = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(4000) });
        const data = await res.json();
        return DACH.includes(data.country_code) ? 'de' : 'en';
      } catch (e) {
        // Fallback: browser language if IP lookup fails
        return (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';
      }
    }

    function applyLang(lang) {
      const t = T[lang];
      document.documentElement.lang = lang;

      document.getElementById('txt-eyebrow').textContent = t.eyebrow;
      document.getElementById('txt-h1').innerHTML = t.h1.map((line, i) =>

      document.getElementById('txt-sub').textContent = t.sub;

      document.getElementById('txt-trust2').textContent = t.trust2;
      document.getElementById('footer-text').innerHTML = t.footer;
    }

    // Apply language on load
    detectLang().then(applyLang);

    // ── Timer until midnight ──────────────────────────────────────────────────
    function updateTimer() {
      const now = new Date();
      const midnight = new Date();
      midnight.setHours(24, 0, 0, 0);
      let diff = Math.floor((midnight - now) / 1000);
      if (diff < 0) diff = 0;
      document.getElementById('t-h').textContent = String(Math.floor(diff / 3600)).padStart(2, '0');
      document.getElementById('t-m').textContent = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
      document.getElementById('t-s').textContent = String(diff % 60).padStart(2, '0');
    }
    updateTimer();
    setInterval(updateTimer, 1000);
